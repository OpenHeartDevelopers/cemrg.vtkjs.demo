<!--
    controller.html
    
    UI panel rendered by vtkFullScreenRenderWindow.addController().
    
    Changes from original:
      - 'resolution' slider renamed to 'opacity' (was mislabelled; it controlled
        setOpacity, not geometric resolution). Class also updated to '.opacity'.
      - Added 'Start Pulse' button for the heartbeat animation toggle.
      - Removed the raw extension link (belongs in onboarding, not the live UI).
-->
<table>
    <tr>
        <td>
            <button class='vrbutton' style="width: 100%">Send To VR</button>
        </td>
    </tr>
    <tr>
        <td>
            <button class='pulsebutton' style="width: 100%">Start Pulse</button>
        </td>
    </tr>
    <tr>
        <td>
            <select class='meshes' style="width: 100%">
                <option value='0' selected>Healthy</option>
                <option value='1'>Atrial Fibrillation</option>
                <option value='2'>Heart Failure</option>
            </select>
        </td>
    </tr>
    <tr>
        <td>
            <select class='representations' style="width: 100%">
                <option value='0'>Points</option>
                <option value='1'>Wireframe</option>
                <option value='2' selected>Surface</option>
            </select>
        </td>
    </tr>
    <tr>
        <td>
            <label style="font-size: 11px; color: #aaa;">Opacity</label>
            <input class='opacity' type='range' min='1' max='10' value='10' style="width: 100%" />
        </td>
    </tr>
</table>
