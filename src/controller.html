<!--
    controller.html
    
    Changes from original:
      - 'resolution' slider class renamed to 'opacity' (it controls setOpacity;
        the original label was factually wrong).
      - Added 'Start/Stop Pulse' button (.pulsebutton).
      - Added 'Controls' overlay toggle button (.controlsbutton).
      - Fixed 'Atrial Fibrillation' spelling.
      - Removed extension link (onboarding concern, not live UI).
-->
<table>
    <tr>
        <td>
            <button class='vrbutton' style="width: 100%">Send To VR</button>
        </td>
    </tr>
    <tr>
        <td>
            <!-- Label updated by JS to 'Stop Pulse' on init since pulse starts active -->
            <button class='pulsebutton' style="width: 100%">Start Pulse</button>
        </td>
    </tr>
    <tr>
        <td>
            <button class='controlsbutton' style="width: 100%">Toggle Controls</button>
        </td>
    </tr>
    <tr>
        <td>
            <select class='meshes' style="width: 100%">
                <option value='0' selected>Healthy</option>
                <option value='1'>Atrial Fibrillation</option>
                <option value='2'>Heart Failure</option>
            </select>
        </td>
    </tr>
    <tr>
        <td>
            <select class='representations' style="width: 100%">
                <option value='0'>Points</option>
                <option value='1'>Wireframe</option>
                <option value='2' selected>Surface</option>
            </select>
        </td>
    </tr>
    <tr>
        <td>
            <label style="font-size: 11px; color: #aaa; display: block; margin-top: 4px;">Opacity</label>
            <input class='opacity' type='range' min='1' max='10' value='10' style="width: 100%" />
        </td>
    </tr>
</table>
